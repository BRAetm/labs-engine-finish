# Labs marketplace — nginx site config.
#
# Layout on disk:
#   /var/www/marketplace/manifest.json        (public)
#   /var/www/marketplace/downloads/<slug>.zip (gated by token for locked entries)
#
# Validator runs separately on 127.0.0.1:8787 (see validate.py / systemd unit).
#
# How locking works:
#   • Public scripts live under /downloads/public/<file>     — no auth_request.
#   • Locked scripts live under /downloads/locked/<slug>.zip — auth_request hits
#     the Flask validator with the token and slug.  Without a valid token the
#     client gets a 403 and never sees the bytes.
#
# Replace `marketplace.example.com` with your real host; add a TLS block via
# certbot before going live.

server {
    listen 80;
    server_name marketplace.example.com;

    root /var/www/marketplace;

    # ---- Public manifest ----------------------------------------------------
    # Cache-bust on every request — manifest changes frequently and is small.
    location = /marketplace/manifest.json {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /manifest.json =404;
    }

    # ---- Public downloads ---------------------------------------------------
    location /downloads/public/ {
        autoindex off;
    }

    # ---- Locked downloads ---------------------------------------------------
    # Extract the slug from the filename so the validator gets a clean value.
    # Convention: locked files are named "<slug>.zip" exactly.
    location ~ ^/downloads/locked/(?<script_slug>[A-Za-z0-9._-]+)\.zip$ {
        auth_request      /_validate;
        auth_request_set  $auth_status $upstream_status;

        # Pass slug + token through to the auth subrequest via headers, since
        # auth_request can't forward the original query string by default.
        # The auth location below mirrors them back into a query string.
        proxy_set_header  X-Slug  $script_slug;

        autoindex off;
    }

    # ---- Internal auth subrequest -------------------------------------------
    # Nginx hits this for every locked download.  The validator sees the slug
    # via a header (set above) and the token via the original ?token=... query
    # string, which we forward verbatim.
    location = /_validate {
        internal;
        proxy_pass              http://127.0.0.1:8787/api/validate?token=$arg_token&slug=$http_x_slug;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
    }

    # ---- Hardening ----------------------------------------------------------
    location ~ /\. { deny all; }            # no dotfiles
    location ~ /tokens\.json$ { deny all; } # never leak the token store
}
